# Configuration centrale — reproductibilité : tout est loggé dans MLflow.
seed: 42
experiment_name: interpretable-vision

data:
  data_dir: data
  batch_size: 128
  num_workers: 2
  image_size: 32          # 32 pour CIFAR-10 ; 160 pour Imagenette

model:
  in_channels: 3
  n_classes: 10
  widths: [32, 64, 128]
  attention_temperature: 1.0

optimizer:
  lr: 0.001
  weight_decay: 0.0001

train:
  epochs: 20
